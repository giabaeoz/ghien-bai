<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Cổng Game Thông Minh — Trải nghiệm đỉnh cao, cuộc vui trọn vẹn.">
    <meta name="theme-color" content="#0a0a0a">
    <title>Game Hub - Cổng Game Thông Minh</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style-index.css">
</head>
<body>
    <!-- SECTION 1: HERO BANNER -->
    <section id="hero" class="hero-section">
        <!-- Video Background -->
        <video class="video-bg" src="images/video-background.mp4" autoplay loop muted playsinline></video>
        
        <!-- Overlay -->
        <div class="video-overlay"></div>
        
        <!-- Center Content -->
        <div class="hero-content">
            <h1 class="slogan-main">Cổng Game Thông Minh</h1>
            <p class="slogan-sub">Trải nghiệm đỉnh cao - Cuộc vui trọn vẹn</p>
            
            <button id="btnScrollDown" class="cta-btn" aria-label="Xem trò chơi">
                Xem trò chơi
                <svg class="icon-arrow" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <polyline points="19 12 12 19 5 12"></polyline>
                </svg>
            </button>
        </div>
    </section>

    <!-- SECTION 2: GAME GRID -->
    <section id="game-list" class="games-section">
        <div class="container">
            <h2 class="section-title">Danh sách trò chơi</h2>
            
            <div class="game-grid">
                <!-- Thẻ 1: Tiến Lên Score (Sẵn sàng) -->
                <div class="game-card ready">
                    <div class="card-inner">
                        <h3 class="game-name">Tiến Lên Score</h3>
                        <p class="game-status status-ready">Sẵn sàng</p>
                    </div>
                    <div class="card-action">
                        <a href="html/tienlen.html" class="btn-play">Vào bàn</a>
                    </div>
                </div>

                <!-- Thẻ 2: Phỏm (Coming Soon) -->
                <div class="game-card coming-soon">
                    <div class="card-inner">
                        <h3 class="game-name">Phỏm</h3>
                        <p class="game-status status-soon">Coming Soon</p>
                    </div>
                    <div class="card-action">
                        <span class="btn-disabled">Sắp ra mắt</span>
                    </div>
                </div>

                <!-- Thẻ 3: Bài Cào (Coming Soon) -->
                <div class="game-card coming-soon">
                    <div class="card-inner">
                        <h3 class="game-name">Bài Cào</h3>
                        <p class="game-status status-soon">Coming Soon</p>
                    </div>
                    <div class="card-action">
                        <span class="btn-disabled">Sắp ra mắt</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="js/script-index.js"></script>
</body>
</html>
