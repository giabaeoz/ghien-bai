<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Tiến Lên Score — Ứng dụng tính điểm Tiến Lên miền Nam nhanh, chính xác. Giao diện Cyberpunk Casino đẹp mắt.">
    <meta name="theme-color" content="#050510">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>♠ Tiến Lên Score — Cyberpunk Casino</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<main class="app">
    <header class="header">
        <h1>♠️ Tiến Lên Score ♥️</h1>
        <p>Tính điểm nhanh, chuẩn xác, không lo nhầm lẫn</p>
    </header>
    <section class="card" id="setupSection">
        <h2 class="card-title">♦️ Thiết lập bàn chơi ♣️</h2>
        <div class="form-group">
            <label>Mức cược</label>
            <select id="betSelect">
                <option value="3-6">3 - 6</option>
                <option value="4-8">4 - 8</option>
                <option value="5-10">5 - 10</option>
                <option value="10-20">10 - 20</option>
                <option value="20-40">20 - 40</option>
                <option value="custom">Tùy chỉnh</option>
            </select>
        </div>
        <div id="customBetBox" class="custom-bet-box hidden">
            <div class="form-group">
                <label>Điểm thấp</label>
                <input type="number" id="lowBetInput" placeholder="Ví dụ: 5">
            </div>
            <div class="form-group">
                <label>Điểm cao</label>
                <input type="number" id="highBetInput" placeholder="Ví dụ: 10">
            </div>
        </div>
        <div class="input-grid">
            <div class="form-group">
                <label>Phạt Tới trắng</label>
                <select id="toiTrangMultiplierSelect">
                    <option value="1">Nhân 1</option>
                    <option value="2" selected>Nhân 2</option>
                </select>
            </div>
            <div class="form-group">
                <label>Phạt Giết ngộp</label>
                <select id="gietMultiplierSelect">
                    <option value="1">Nhân 1</option>
                    <option value="2" selected>Nhân 2</option>
                </select>
            </div>
        </div>
        <div class="player-inputs">
            <div class="form-group">
                <label>Người chơi 1</label>
                <input type="text" id="player1" placeholder="Tên người chơi 1">
            </div>
            <div class="form-group">
                <label>Người chơi 2</label>
                <input type="text" id="player2" placeholder="Tên người chơi 2">
            </div>
            <div class="form-group">
                <label>Người chơi 3</label>
                <input type="text" id="player3" placeholder="Tên người chơi 3">
            </div>
            <div class="form-group">
                <label>Người chơi 4</label>
                <input type="text" id="player4" placeholder="Tên người chơi 4">
            </div>
        </div>
        <button id="startBtn" class="btn main-btn">Vào Bàn</button>
    </section>
    <section class="card hidden" id="scoreSection">
        <div class="score-title">
            <h2 class="card-title">Bảng Tổng Điểm</h2>
            <span id="currentBetText" class="bet-badge"></span>
        </div>
        <div id="scoreBoard" class="score-board"></div>
        
        <div class="total-score">
            Quỹ bàn (Check lỗi): <span id="totalScoreText">0</span>
        </div>
        <details class="extra-box">
            <summary>⚙️ Điều chỉnh điểm thủ công</summary>
            <div class="extra-content input-grid" style="align-items: end;">
                <div class="form-group">
                    <label>Người chơi</label>
                    <select id="manualPlayerSelect"></select>
                </div>
                <div class="form-group">
                    <label>Số điểm (vd: 5 hoặc -5)</label>
                    <input type="number" id="manualPointInput" placeholder="Nhập điểm">
                </div>
                <button id="manualAdjustBtn" class="btn warning-btn">Cập nhật</button>
            </div>
        </details>
    </section>
    <section class="card hidden" id="gameSection">
        <h2 class="card-title">Bàn hiện tại</h2>
        <p class="hint">Chọn kết quả cho từng người chơi:</p>
        <div id="rankArea" class="rank-area"></div>
        <details class="extra-box">
            <summary>🔥 Tùy chọn chặt chém</summary>
            <details class="mini-box">
                <summary>🗡️ Chặt heo</summary>
                <div class="extra-content">
                    <div class="form-group">
                        <label>Người chặt</label>
                        <select id="cutterSelect"></select>
                    </div>
                    <div class="form-group">
                        <label>Người bị chặt</label>
                        <select id="victimSelect"></select>
                    </div>
                    <div class="form-group">
                        <label>Loại heo bị chặt</label>
                        <select id="pigTypeSelect">
                            <option value="black">Heo đen</option>
                            <option value="red">Heo đỏ</option>
                        </select>
                    </div>
                    <button id="addPigBtn" class="btn action-btn">Thêm chặt heo</button>
                    <div id="pigList" class="action-list"></div>
                </div>
            </details>
            <details class="mini-box">
                <summary>💩 Thúi heo (chết ngộp)</summary>
                <div class="extra-content">
                    <div class="input-grid">
                        <div class="form-group">
                            <label>Người ăn tiền</label>
                            <select id="rottenWinnerSelect"></select>
                        </div>
                        <div class="form-group">
                            <label>Người thúi</label>
                            <select id="rottenVictimSelect"></select>
                        </div>
                    </div>
                    <div class="input-grid">
                        <div class="form-group">
                            <label>Heo đen</label>
                            <input type="number" id="rottenBlackInput" min="0" value="0">
                        </div>
                        <div class="form-group">
                            <label>Heo đỏ</label>
                            <input type="number" id="rottenRedInput" min="0" value="0">
                        </div>
                        <div class="form-group">
                            <label>3 đôi thông</label>
                            <input type="number" id="rottenTriplePairInput" min="0" value="0">
                        </div>
                    </div>
                    <button id="addRottenPigBtn" class="btn action-btn">Thêm thúi heo</button>
                    <div id="rottenPigList" class="action-list"></div>
                </div>
            </details>
            <details class="mini-box">
                <summary>⚡ Chặt chồng</summary>
                <div class="extra-content">
                    <div class="form-group">
                        <label>Người chồng</label>
                        <select id="stackerSelect"></select>
                    </div>
                    <div class="form-group">
                        <label>Người bị chồng (nạn nhân cũ)</label>
                        <select id="stackVictimSelect"></select>
                    </div>
                    <div class="form-group">
                        <label>Bộ dùng để chồng</label>
                        <select id="stackAddSelect">
                            <option value="triplePair">3 đôi thông</option>
                            <option value="fourKind">Tứ quý</option>
                        </select>
                    </div>
                    <button id="addStackBtn" class="btn action-btn">Thêm chặt chồng</button>
                    <div id="stackList" class="action-list"></div>
                </div>
            </details>
        </details>
        <div class="main-actions">
            <button id="calculateBtn" class="btn main-btn">✅ Chốt Bàn Này</button>
            <button id="clearRoundBtn" class="btn light-btn">🔄 Xóa làm lại</button>
        </div>
        <div id="messageBox" class="message-box"></div>
    </section>
    <section class="card hidden" id="historySection">
        <h2 class="card-title">📜 Lịch sử các ván</h2>
        <div id="historyList"></div>
    </section>
    <button id="resetBtn" class="btn danger-btn hidden">⚠️ Kết thúc ván - Chơi lại từ đầu</button>
</main>
<script src="script.js"></script>
</body>
</html>
